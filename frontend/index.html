<!DOCTYPE html><html lang='en'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width, initial-scale=1.0'><title>LEDGER Finance Tracker</title><style>body { font-family: 'DM Mono', monospace; background-color: #1a1a1a; color: #fff; } .container { max-width: 1200px; margin: 40px auto; padding: 20px; background-color: #2a2a2a; border-radius: 10px; box-shadow: 0 0 10px rgba(0, 0, 0, 0.2); } .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; } .header h1 { font-family: 'Cormorant Garamond', serif; font-size: 24px; color: #ffd700; } .dark-mode-toggle { position: absolute; top: 10px; right: 10px; } .filter-button { background-color: #444; color: #fff; border: none; padding: 10px 20px; font-size: 16px; cursor: pointer; } .filter-button:hover { background-color: #555; } .transactions-table { border-collapse: collapse; width: 100%; } .transactions-table th, .transactions-table td { border: 1px solid #333; padding: 10px; text-align: left; } .transactions-table th { background-color: #333; color: #fff; } .chart-container { margin-top: 20px; } .pie-chart, .line-chart, .bar-chart, .scatter-chart, .radar-chart, .polar-area-chart, .doughnut-chart, .bubble-chart { width: 100%; height: 400px; } .animation { transition: all 0.5s ease-in-out; } .animation:hover { transform: scale(1.1); }</style></head><body><div class='container'><div class='header'><h1>LEDGER Finance Tracker</h1><button class='dark-mode-toggle'>Toggle Dark Mode</button></div><button class='filter-button'>Filter Transactions</button><select><option>Category 1</option><option>Category 2</option><option>Category 3</option></select><table class='transactions-table'><thead><tr><th>Date</th><th>Category</th><th>Amount</th></tr></thead><tbody><tr><td>2022-01-01</td><td>Income</td><td>$1000</td></tr><tr><td>2022-01-02</td><td>Expenses</td><td>$500</td></tr></tbody></table><div class='chart-container'><canvas class='pie-chart animation'></canvas><canvas class='line-chart animation'></canvas><canvas class='bar-chart animation'></canvas><canvas class='scatter-chart animation'></canvas><canvas class='radar-chart animation'></canvas><canvas class='polar-area-chart animation'></canvas><canvas class='doughnut-chart animation'></canvas><canvas class='bubble-chart animation'></canvas></div><script src='https://cdn.jsdelivr.net/npm/chart.js'></script><script>const pieChart = document.querySelector('.pie-chart');const lineChart = document.querySelector('.line-chart');const barChart = document.querySelector('.bar-chart');const scatterChart = document.querySelector('.scatter-chart');const radarChart = document.querySelector('.radar-chart');const polarAreaChart = document.querySelector('.polar-area-chart');const doughnutChart = document.querySelector('.doughnut-chart');const bubbleChart = document.querySelector('.bubble-chart');const ctx1 = pieChart.getContext('2d');const ctx2 = lineChart.getContext('2d');const ctx3 = barChart.getContext('2d');const ctx4 = scatterChart.getContext('2d');const ctx5 = radarChart.getContext('2d');const ctx6 = polarAreaChart.getContext('2d');const ctx7 = doughnutChart.getContext('2d');const ctx8 = bubbleChart.getContext('2d');new Chart(ctx1, { type: 'pie', data: { labels: ['Income', 'Expenses'], datasets: [{ label: 'Distribution', data: [1000, 500], backgroundColor: ['rgba(255, 99, 132, 0.2)', 'rgba(54, 162, 235, 0.2)'], borderColor: ['rgba(255, 99, 132, 1)', 'rgba(54, 162, 235, 1)'], borderWidth: 1 }], }, options: { title: { display: true, text: 'Distribution of Income and Expenses' } } });new Chart(ctx2, { type: 'line', data: { labels: ['2022-01-01', '2022-01-02'], datasets: [{ label: 'Net Worth Trend', data: [1000, 500], backgroundColor: 'rgba(255, 99, 132, 0.2)', borderColor: 'rgba(255, 99, 132, 1)', borderWidth: 1 }], }, options: { title: { display: true, text: 'Net Worth Trend' } } });new Chart(ctx3, { type: 'bar', data: { labels: ['2022-01-01', '2022-01-02'], datasets: [{ label: 'Distribution of Income and Expenses', data: [1000, 500], backgroundColor: ['rgba(255, 99, 132, 0.2)', 'rgba(54, 162, 235, 0.2)'], borderColor: ['rgba(255, 99, 132, 1)', 'rgba(54, 162, 235, 1)'], borderWidth: 1 }], }, options: { title: { display: true, text: 'Distribution of Income and Expenses' } } });new Chart(ctx4, { type: 'scatter', data: { datasets: [{ label: 'Correlation between Income and Expenses', data: [{ x: 1000, y: 500 }, { x: 500, y: 1000 }], backgroundColor: 'rgba(255, 99, 132, 0.2)' }], }, options: { title: { display: true, text: 'Correlation between Income and Expenses' } } });new Chart(ctx5, { type: 'radar', data: { labels: ['Income', 'Expenses', 'Net Worth', 'Savings'], datasets: [{ label: 'Distribution', data: [1000, 500, 500, 1000], backgroundColor: 'rgba(255, 99, 132, 0.2)', borderColor: 'rgba(255, 99, 132, 1)', borderWidth: 1 }], }, options: { title: { display: true, text: 'Distribution of Income, Expenses, Net Worth, and Savings' } } });new Chart(ctx6, { type: 'polarArea', data: { labels: ['Income', 'Expenses'], datasets: [{ label: 'Distribution', data: [1000, 500], backgroundColor: ['rgba(255, 99, 132, 0.2)', 'rgba(54, 162, 235, 0.2)'], borderColor: ['rgba(255, 99, 132, 1)', 'rgba(54, 162, 235, 1)'], borderWidth: 1 }], }, options: { title: { display: true, text: 'Distribution of Income and Expenses' } } });new Chart(ctx7, { type: 'doughnut', data: { labels: ['Income', 'Expenses', 'Savings'], datasets: [{ label: 'Distribution', data: [1000, 500, 1000], backgroundColor: ['rgba(255, 99, 132, 0.2)', 'rgba(54, 162, 235, 0.2)', 'rgba(255, 206, 86, 0.2)'], borderColor: ['rgba(255, 99, 132, 1)', 'rgba(54, 162, 235, 1)', 'rgba(255, 206, 86, 1)'], borderWidth: 1 }], }, options: { title: { display: true, text: 'Distribution of Income, Expenses, and Savings' } } });new Chart(ctx8, { type: 'bubble', data: { datasets: [{ label: 'Correlation between Income, Expenses, and Net Worth', data: [{ x: 1000, y: 500, r: 10 }, { x: 500, y: 1000, r: 15 }], backgroundColor: 'rgba(255, 99, 132, 0.2)' }], }, options: { title: { display: true, text: 'Correlation between Income, Expenses, and Net Worth' } } });const darkModeToggle = document.querySelector('.dark-mode-toggle');darkModeToggle.addEventListener('click', () => { document.body.classList.toggle('dark-mode'); });const filterButton = document.querySelector('.filter-button');filterButton.addEventListener('click', () => { const select = document.querySelector('select'); const selectedCategory = select.value; const transactionsTable = document.querySelector('.transactions-table'); const rows = transactionsTable.rows; for (let i = 1; i < rows.length; i++) { const row = rows[i]; const categoryCell = row.cells[1]; if (categoryCell.textContent === selectedCategory) { row.style.display = ''; } else { row.style.display = 'none'; } } });</script></div></body></html>
