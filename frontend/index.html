<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a2e; /* Deep dark blue/purple background */
            color: #e0e0ff; /* Light text color */
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }
        header {
            text-align: center;
            border-bottom: 2px solid #4a4e69;
            padding-bottom: 15px;
            margin-bottom: 30px;
        }
        h1 {
            color: #a8dadc; /* Light cyan for title */
        }
        .dashboard-container {
            max-width: 1400px;
            margin: auto;
        }
        .summary-cards {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }
        .card {
            background-color: #2c394b; /* Slightly lighter card background */
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            flex: 1;
            min-width: 200px;
            border-left: 5px solid #4a4e69;
        }
        .card h2 {
            color: #f1faee;
            margin-top: 0;
            border-bottom: 1px solid #4a4e69;
            padding-bottom: 10px;
        }
        .chart-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 25px;
        }
        .chart-wrapper {
            background-color: #2c394b;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <header>
            <h1>Financial Overview Dashboard</h1>
        </header>

        <!-- Summary Cards Section -->
        <div class="summary-cards">
            <div class="card">
                <h2>Total Income</h2>
                <p id="total-income">$0.00</p>
            </div>
            <div class="card">
                <h2>Total Expenses</h2>
                <p id="total-expenses">$0.00</p>
            </div>
            <div class="card">
                <h2>Net Balance</h2>
                <p id="net-balance">$0.00</p>
            </div>
        </div>

        <!-- Charts Section -->
        <div class="chart-grid">
            <div class="chart-wrapper">
                <h2>Monthly Spending Trend</h2>
                <canvas id="spendingChart"></canvas>
            </div>
            <div class="chart-wrapper">
                <h2>Expense Breakdown (Pie)</h2>
                <canvas id="expenseBreakdownChart"></canvas>
            </div>
            <div class="chart-wrapper">
                <h2>Asset Allocation (Bar)</h2>
                <canvas id="assetAllocationChart"></canvas>
            </div>
            <div class="chart-wrapper">
                <h2>Net Worth Over Time</h2>
                <canvas id="netWorthChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        // --- Mock Data ---
        const mockData = {
            income: 5500.00,
            expenses: 3200.00,
            assets: 150000.00,
            netBalance: 2300.00,
            monthlySpending: {
                'Jan': 1200,
                'Feb': 1500,
                'Mar': 1100,
                'Apr': 1800,
                'May': 1300,
                'Jun': 2000
            },
            expenseCategories: [
                { category: 'Rent', amount: 1500 },
                { category: 'Groceries', amount: 400 },
                { category: 'Utilities', amount: 300 },
                { category: 'Entertainment', amount: 250 },
                { category: 'Transport', amount: 350 }
            ],
            netWorthHistory: [100000, 105000, 110000, 115000, 120000, 125000]
        };

        // --- DOM Manipulation ---
        document.getElementById('total-income').textContent = `$${mockData.income.toFixed(2)}`;
        document.getElementById('total-expenses').textContent = `$${mockData.expenses.toFixed(2)}`;
        document.getElementById('net-balance').textContent = `$${mockData.netBalance.toFixed(2)}`;


        // --- Chart Initialization ---

        // 1. Monthly Spending Trend (Line Chart)
        const spendingCtx = document.getElementById('spendingChart').getContext('2d');
        new Chart(spendingCtx, {
            type: 'line',
            data: {
                labels: Object.keys(mockData.monthlySpending),
                datasets: [{
                    label: 'Monthly Spending ($)',
                    data: Object.values(mockData.monthlySpending),
                    borderColor: '#a8dadc',
                    backgroundColor: 'rgba(168, 218, 220, 0.2)',
                    fill: true,
                    tension: 0.3
                }]
            },
            options: {
                responsive: true,
                scales: {
                    y: {
                        beginAtZero: true,
                        grid: { color: '#4a4e69' }
                    },
                    x: {
                        grid: { color: '#4a4e69' }
                    }
                },
                plugins: {
                    legend: {
                        display: false
                    },
                    title: {
                        display: false
                    }
                }
            }
        });

        // 2. Expense Breakdown (Pie Chart)
        const expenseBreakdownCtx = document.getElementById('expenseBreakdownChart').getContext('2d');
        const expenseLabels = mockData.expenseCategories.map(item => item.category);
        const expenseData = mockData.expenseCategories.map(item => item.amount);

        new Chart(expenseBreakdownCtx, {
            type: 'pie',
            data: {
                labels: expenseLabels,
                datasets: [{
                    data: expenseData,
                    backgroundColor: [
                        '#e63946', // Red
                        '#f4a261', // Orange
                        '#457b9d', // Blue
                        '#1d3557', // Dark Blue
                        '#f2c85a'  // Yellow
                    ],
                    hoverOffset: 4
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: {
                        position: 'right',
                        labels: { color: '#e0e0ff' }
                    },
                    title: {
                        display: false
                    }
                }
            }
        });

        // 3. Asset Allocation (Bar Chart)
        const assetAllocationCtx = document.getElementById('assetAllocationChart').getContext('2d');
        new Chart(assetAllocationCtx, {
            type: 'bar',
            data: {
                labels: ['Assets'],
                datasets: [{
                    label: 'Current Assets ($)',
                    data: [mockData.assets],
                    backgroundColor: '#4a4e69'
                }]
            },
            options: {
                responsive: true,
                scales: {
                    y: {
                        beginAtZero: true,
                        grid: { color: '#4a4e69' }
                    }
                }
            }
        });

        // Note: The NetWorth chart is omitted for brevity, but would follow a similar structure.
    </script>
</body>
</html>
