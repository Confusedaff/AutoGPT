<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>LEDGER — Personal Finance</title><link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400;500&family=Syne:wght@400;500;700;800&display=swap" rel="stylesheet"><script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script><style>:root {--bg: #0a0a0b;--bg2: #111114;--bg3: #18181d;--border: #2a2a32;--gold: #c9a84c;--gold2: #e8c97a;--text: #e8e6df;--muted: #6b6870;--green: #4caf7d;--red: #e05c5c;--blue: #5c8de0;--radius: 12px;--glow: 0 0 30px rgba(201,168,76,0.08);}:root {--dark-mode-toggle-bg: #2a2a32;--dark-mode-toggle-border: #2a2a32;--dark-mode-toggle-circle-bg: #c9a84c;}*, *::before, *::after {box-sizing: border-box;margin: 0;padding: 0;}body {font-family: 'DM Mono', monospace;background: var(--bg);color: var(--text);min-height: 100vh;overflow-x: hidden;}/* ── Noise overlay ── */body::before {content: '';position: fixed;inset: 0;background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");pointer-events: none;z-index: 999;}/* ── Sidebar ── */.sidebar {position: fixed;top: 0;left: 0;width: 240px;height: 100vh;background: var(--bg2);border-right: 1px solid var(--border);display: flex;flex-direction: column;padding: 36px 0;z-index: 100;}.logo {padding: 0 28px 32px;border-bottom: 1px solid var(--border);margin-bottom: 24px;}.logo-text {font-family: 'Syne', sans-serif;font-weight: 800;font-size: 22px;letter-spacing: 6px;color: var(--gold);}.logo-sub {font-size: 10px;letter-spacing: 3px;color: var(--muted);text-transform: uppercase;margin-top: 4px;}.nav {flex: 1;}.nav-item {display: flex;align-items: center;gap: 12px;padding: 12px 28px;cursor: pointer;font-size: 11px;letter-spacing: 2px;text-transform: uppercase;color: var(--muted);transition: all 0.2s;border-left: 2px solid transparent;}.nav-item:hover {color: var(--text);background: rgba(255,255,255,0.03);}.nav-item.active {color: var(--gold);border-left-color: var(--gold);background: rgba(201,168,76,0.06);}.nav-icon {font-size: 16px;width: 20px;text-align: center;}.month-nav {padding: 20px 28px;border-top: 1px solid var(--border);}.month-nav label {font-size: 9px;letter-spacing: 2px;color: var(--muted);text-transform: uppercase;display: block;margin-bottom: 8px;}.month-nav input {background: var(--bg3);border: 1px solid var(--border);color: var(--text);border-radius: 6px;padding: 8px 10px;font-family: 'DM Mono', monospace;font-size: 12px;width: 100%;cursor: pointer;}.month-nav input:focus {outline: none;border-color: var(--gold);}.dark-mode-toggle {position: absolute;top: 20px;right: 20px;}.dark-mode-toggle input {display: none;}.dark-mode-toggle label {cursor: pointer;display: flex;align-items: center;justify-content: space-between;width: 50px;height: 25px;background: var(--dark-mode-toggle-bg);border-radius: 25px;position: relative;}.dark-mode-toggle label::before {content: '';position: absolute;top: 2px;left: 2px;width: 21px;height: 21px;background: var(--dark-mode-toggle-circle-bg);border-radius: 50%;transition: transform 0.3s ease-in-out;}.dark-mode-toggle input:checked + label::before {transform: translateX(25px);}.dark-mode-toggle label::after {content: '';position: absolute;top: 2px;right: 2px;width: 21px;height: 21px;background: var(--dark-mode-toggle-circle-bg);border-radius: 50%;transition: transform 0.3s ease-in-out;}.dark-mode-toggle input:checked + label::after {transform: translateX(-25px);}.dark-mode {background: #fff;color: #0a0a0b;}.dark-mode .sidebar {background: #f7f7f7;}.dark-mode .nav-item {color: #333;}.dark-mode .nav-item:hover {color: #000;}.dark-mode .nav-item.active {color: #c9a84c;}.dark-mode .month-nav label {color: #666;}.dark-mode .month-nav input {background: #fff;border: 1px solid #ddd;color: #333;}.dark-mode .month-nav input:focus {outline: none;border-color: #c9a84c;}.dark-mode .kpi {background: #f7f7f7;}.dark-mode .kpi:hover {background: #fff;}.dark-mode .kpi-value {color: #333;}.dark-mode .kpi-value.income {color: #4caf7d;}.dark-mode .kpi-value.expense {color: #e05c5c;}.dark-mode .kpi-value.net.pos {color: #4caf7d;}.dark-mode .kpi-value.net.neg {color: #e05c5c;}.dark-mode .kpi-value.savings {color: #c9a84c;}.dark-mode .tx-row {background: #fff;}.dark-mode .tx-row:hover {background: #f7f7f7;}.dark-mode .tx-amount {color: #333;}.dark-mode .tx-amount.income {color: #4caf7d;}.dark-mode .tx-amount.expense {color: #e05c5c;}.dark-mode .btn {background: #c9a84c;color: #0a0a0b;}.dark-mode .btn:hover {background: #e8c97a;}.dark-mode .btn:active {transform: translateY(0);}.dark-mode .btn.outline {background: transparent;color: #c9a84c;border: 1px solid #c9a84c;}.dark-mode .btn.outline:hover {background: rgba(201,168,76,0.08);}.dark-mode .btn.danger {background: #e05c5c;color: #fff;}.dark-mode .btn.sm {padding: 6px 12px;font-size: 10px;}.main {margin-left: 240px;min-height: 100vh;padding: 40px 48px;}.page {display: none;animation: fadeUp 0.4s ease;}.page.active {display: block;}.page-header {display: flex;align-items: flex-end;justify-content: space-between;margin-bottom: 36px;padding-bottom: 24px;border-bottom: 1px solid var(--border);}.page-title {font-family: 'Cormorant Garamond', serif;font-size: 52px;font-weight: 300;line-height: 1;letter-spacing: -1px;}.page-title span {color: var(--gold);font-style: italic;}.page-date {font-size: 11px;letter-spacing: 2px;color: var(--muted);}.kpi-grid {display: grid;grid-template-columns: repeat(4, 1fr);gap: 16px;margin-bottom: 32px;}.kpi {background: var(--bg2);border: 1px solid var(--border);border-radius: var(--radius);padding: 24px;position: relative;overflow: hidden;transition: border-color 0.2s, box-shadow 0.2s;}.kpi:hover {border-color: var(--gold);box-shadow: var(--glow);}.kpi::after {content: '';position: absolute;top: 0;left: 0;right: 0;height: 2px;background: var(--gold);opacity: 0;transition: opacity 0.2s;}.kpi:hover::after {opacity: 1;}.kpi-label {font-size: 9px;letter-spacing: 3px;color: var(--muted);text-transform: uppercase;margin-bottom: 12px;}.kpi-value {font-family: 'Cormorant Garamond', serif;font-size: 36px;font-weight: 300;line-height: 1;}.kpi-value.income {color: var(--green);}.kpi-value.expense {color: var(--red);}.kpi-value.net.pos {color: var(--green);}.kpi-value.net.neg {color: var(--red);}.kpi-value.savings {color: var(--gold);}.kpi-sub {font-size: 10px;color: var(--muted);margin-top: 6px;}.charts-row {display: grid;grid-template-columns: 1.6fr 1fr;gap: 16px;margin-bottom: 32px;}.card {background: var(--bg2);border: 1px solid var(--border);border-radius: var(--radius);padding: 28px;}.card-title {font-size: 9px;letter-spacing: 3px;color: var(--muted);text-transform: uppercase;margin-bottom: 20px;display: flex;justify-content: space-between;align-items: center;}.card-title span {color: var(--gold);font-size: 10px;}.chart-wrap {position: relative;height: 220px;}.tx-header {display: flex;align-items: center;justify-content: space-between;margin-bottom: 20px;}.section-title {font-family: 'Cormorant Garamond', serif;font-size: 28px;font-weight: 300;}.btn {background: var(--gold);color: #0a0a0b;border: none;border-radius: 8px;padding: 10px 20px;font-family: 'DM Mono', monospace;font-size: 11px;letter-spacing: 1.5px;text-transform: uppercase;cursor: pointer;transition: background 0.2s, transform 0.1s;font-weight: 500;}.btn:hover {background: var(--gold2);transform: translateY(-1px);}.btn:active {transform: translateY(0);}.btn.outline {background: transparent;color: var(--gold);border: 1px solid var(--gold);}.btn.outline:hover {background: rgba(201,168,76,0.08);}.bar-chart-container {display: none;}.bar-chart-container.active {display: block;}.bar-chart {height: 220px;}.bar-chart .chartjs-render-monitor {height: 220px;}</style></head><body><div class="sidebar"><div class="logo"><span class="logo-text">LEDGER</span><span class="logo-sub">Personal Finance</span></div><div class="nav"><a href="#" class="nav-item active"><span class="nav-icon"></span>Dashboard</a><a href="#" class="nav-item"><span class="nav-icon"></span>Transactions</a><a href="#" class="nav-item"><span class="nav-icon"></span>Settings</a></div><div class="month-nav"><label>Month:</label><input type="month" value="2024-09"></div><div class="dark-mode-toggle"><input type="checkbox" id="dark-mode-toggle"><label for="dark-mode-toggle"></label></div></div><div class="main"><div class="page active"><div class="page-header"><h1 class="page-title">Dashboard<span>Overview</span></h1><p class="page-date">September 2024</p></div><div class="kpi-grid"><div class="kpi"><span class="kpi-label">Income</span><span class="kpi-value income">$1,234.56</span><span class="kpi-sub">+10% from last month</span></div><div class="kpi"><span class="kpi-label">Expenses</span><span class="kpi-value expense">$987.65</span><span class="kpi-sub">-5% from last month</span></div><div class="kpi"><span class="kpi-label">Net Worth</span><span class="kpi-value net pos">$1,234.56</span><span class="kpi-sub">+15% from last month</span></div><div class="kpi"><span class="kpi-label">Savings</span><span class="kpi-value savings">$500.00</span><span class="kpi-sub">+20% from last month</span></div></div><div class="charts-row"><div class="card"><div class="card-title">Transactions<span>View all</span></div><div class="chart-wrap"><canvas id="pie-chart"></canvas></div></div><div class="card"><div class="card-title">Net Worth Trend<span>View all</span></div><div class="chart-wrap"><canvas id="line-chart"></canvas></div></div><div class="card"><div class="card-title">Bar Chart<span>View all</span></div><div class="bar-chart-container active"><canvas id="bar-chart" class="bar-chart"></canvas></div></div></div></div></div><script>const ctx1 = document.getElementById('pie-chart').getContext('2d');const ctx2 = document.getElementById('line-chart').getContext('2d');const ctx3 = document.getElementById('bar-chart').getContext('2d');const pieChart = new Chart(ctx1, {type: 'pie',data: {labels: ['Income', 'Expenses'],datasets: [{label: 'My First Dataset',data: [300, 50],backgroundColor: ["#4caf7d", "#e05c5c"],hoverOffset: 4}]},options: {}});const lineChart = new Chart(ctx2, {type: 'line',data: {labels: ['January', 'February', 'March', 'April', 'May'],datasets: [{label: 'My First Dataset',data: [65, 59, 80, 81, 56],fill: false,borderColor: 'rgba(255, 99, 132, 0.2)',borderWidth: 1}]},options: {}});const barChart = new Chart(ctx3, {type: 'bar',data: {labels: ['January', 'February', 'March', 'April', 'May'],datasets: [{label: 'My First Dataset',data: [65, 59, 80, 81, 56],backgroundColor: ["#4caf7d", "#e05c5c", "#5c8de0", "#4caf7d", "#e05c5c"],hoverOffset: 4}]},options: {}});</script></body></html>
