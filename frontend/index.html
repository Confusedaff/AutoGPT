<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Financial Dashboard</title>
    <style>
        body {
            font-family: 'Georgia', serif; /* Using a serif font for a luxurious feel */
            background-color: #1a1a1a;
            color: #e0e0e0;
            margin: 0;
            padding: 20px;
        }
        .dashboard-container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            color: #ffd700; /* Gold for the main title */
            text-align: center;
            border-bottom: 2px solid #444;
            padding-bottom: 10px;
            margin-bottom: 30px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .stat-card {
            background-color: #2a2a2a;
            border: 1px solid #444;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease;
        }
        .stat-card:hover {
            transform: translateY(-5px);
            border-color: #ffd700;
        }
        .stat-card h2 {
            color: #ffd700;
            margin-top: 0;
            font-size: 1.5em;
        }
        .stat-card p {
            font-size: 1.1em;
            color: #ccc;
        }
        .chart-area {
            background-color: #2a2a2a;
            padding: 30px;
            border-radius: 8px;
            border: 1px solid #444;
        }
        /* Basic styling for chart placeholder */
        .chart-placeholder {
            height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #888;
            font-style: italic;
            border: 1px dashed #555;
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <h1>Financial Overview</h1>

        <div class="stats-grid">
            <div class="stat-card">
                <h2>Total Assets</h2>
                <p>$1,250,000.00</p>
            </div>
            <div class="stat-card">
                <h2>Net Worth</h2>
                <p>$850,000.00</p>
            </div>
            <div class="stat-card">
                <h2>Monthly Income</h2>
                <p>$6,500.00</p>
            </div>
            <div class="stat-card">
                <h2>Investment Growth</h2>
                <p>+12.5% YTD</p>
            </div>
        </div>

        <div class="chart-area">
            <h2>Investment Performance Chart</h2>
            <div class="chart-placeholder">
                [Placeholder for Interactive Chart (e.g., Line or Bar Chart)]
            </div>
        </div>
    </div>
</body>
</html>
